name: Build books

on:
  push:
    branches: [main]
    paths:
      - scenes/**
      - chapters/**
      - chapters.yml
      - fanfic.yml
  pull_request:
    branches: [main]
    paths:
      - scenes/**
      - chapters/**
      - chapters.yml
      - fanfic.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    uses: SceneBasedFF/fanfiction-bookmaker/.github/workflows/build-books.yml@main
    with:
      config-file: fanfic.yml
      output-dir: outputs
      python-version: "3.11"
      commit-outputs: true
      commit-message: "chore: update generated book exports"
