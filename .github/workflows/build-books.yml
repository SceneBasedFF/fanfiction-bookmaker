name: Build books

on:
  workflow_call:
    inputs:
      config-file:
        description: Optional config file at the root of the writing repo.
        required: false
        type: string
        default: fanfic.yml
      output-dir:
        description: Directory where exports should be written.
        required: false
        type: string
        default: outputs
      python-version:
        description: Python version used to run the reusable workflow.
        required: false
        type: string
        default: "3.11"
      commit-outputs:
        description: Whether to commit generated outputs back to the writing repo.
        required: false
        type: boolean
        default: false
      commit-message:
        description: Commit message used when outputs are written back to the repo.
        required: false
        type: string
        default: "chore: update generated book exports"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out writing repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Compile exports
        uses: SceneBasedFF/fanfic-bookmaker@v1
        with:
          config-file: ${{ inputs.config-file }}
          output-dir: ${{ inputs.output-dir }}

      - name: Upload exports
        uses: actions/upload-artifact@v4
        with:
          name: book-exports
          path: ${{ inputs.output-dir }}

      - name: Commit generated outputs
        if: ${{ inputs.commit-outputs && github.event_name == 'push' && github.actor != 'github-actions[bot]' }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.output-dir }}"
          if git diff --cached --quiet; then
            echo "No output changes to commit."
            exit 0
          fi
          git commit -m "${{ inputs.commit-message }}"
          git push origin "HEAD:${{ github.ref_name }}"
